# 基本設定
set -sg escape-time 10
set -g history-limit 64096
setw -g mode-keys vi

# プレフィックスをCtrl+tに変更
set-option -g prefix C-t
unbind C-b
bind C-t send-prefix

# vim風のペイン移動
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Lazygit をポップアップで開く
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# ペイン分割
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Claude Code をポップアップで開く（Ctrl+t a）
bind a display-popup -E -w 80% -h 80% "claude"


# Claude Code をポップアップで開く（ディレクトリごとにセッション維持）
bind -r a run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5 | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# マウス操作を有効化
set -g mouse on

# 256色対応
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# インデックスを1から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウ名を自動変更しない
set-option -g allow-rename off

# ===== Tokyo Night テーマ =====
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# テーマ設定
set -g @tokyo-night-tmux_window_id_style digital
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_date_format YMD
set -g @tokyo-night-tmux_time_format 24H

set -g focus-events on

# フォーカス時にIMEを英数に自動切替（Slackなどから戻った時の対策）
# ポップアップ内では誤入力の原因になるためスキップ
set-hook -g client-focus-in 'if-shell "[ -z \"$TMUX_POPUP\" ]" "run-shell \"osascript -e \\\"tell application \\\\\\\"System Events\\\\\\\" to key code 102\\\"\""'

# TPM初期化（最後に記述）
run '~/.tmux/plugins/tpm/tpm'
# コピーモード設定
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
